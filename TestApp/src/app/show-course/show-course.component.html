<app-menu></app-menu>
<div>
  <h1>Heading Here</h1>
</div>
<div class="data-container">
<h1>All Course Details</h1>
<mat-form-field appearance="standard">
  <mat-label>Global Search (case sensitive)</mat-label>
  <input matInput (keyup)="applyFilter()" placeholder="Enter Course Name" #input [(ngModel)]="filterData">
</mat-form-field>

<div class="table-container mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- First name column -->
    <ng-container matColumnDef="course_name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Course Name </th>
      <td mat-cell *matCellDef="let row"> {{row.course_name}} </td>
    </ng-container>

    <!-- last name Column -->
    <ng-container matColumnDef="course_code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Course Code </th>
      <td mat-cell *matCellDef="let row"> {{row.course_code}} </td>
    </ng-container>

    <!-- Course status column -->
    <ng-container matColumnDef="course_status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let row"> {{userStatus.status[0][row.is_active?'active':'inactive']}} </td>
    </ng-container>

    <!-- Action Column -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef> Action </th>
      <td mat-cell *matCellDef="let row">
        <button mat-raised-button  color="primary" (click)="editCourseDetails(row)" *ngIf="userRole == 'admin'">
          <mat-icon>edit</mat-icon>
          Edit
        </button>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <button mat-raised-button  color="warn"
          (click)="deleteCoursesDetails(row.course_code, 'Delete', 'Are You Sure Want to Delete?')"
          *ngIf="userRole == 'admin'">
          <mat-icon>delete_fill</mat-icon> 
          Delete
        </button>
      </td>
    </ng-container>
    

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>
</div>
  <mat-paginator [pageSizeOptions]="[10, 20, 50, 100]" aria-label="Select page of users"></mat-paginator>
</div>
