<mat-card>
    <mat-card-title>
        Recent Feedback
    </mat-card-title>

<ng-container *ngIf="recentFeedback.length; else empty">

    <table mat-table [dataSource]="recentFeedback" class="recent-table">

        <!-- Student -->

        <ng-container matColumnDef="student">
            <th mat-header-cell *matHeaderCellDef>
                Student
            </th>
            <td mat-cell *matCellDef="let row">
                {{row.student}}
            </td>

        </ng-container>

        <!-- Faculty -->

        <ng-container matColumnDef="faculty">
            <th mat-header-cell *matHeaderCellDef>
                Faculty
            </th>
            <td mat-cell *matCellDef="let row">
                {{row.faculty}}
            </td>

        </ng-container>

        <!-- Subject -->

        <ng-container matColumnDef="subject">
            <th mat-header-cell *matHeaderCellDef>
                Subject
            </th>

            <td mat-cell *matCellDef="let row">
                {{row.subject}}
            </td>

        </ng-container>

        <!-- Rating -->

        <ng-container matColumnDef="rating">
            <th mat-header-cell *matHeaderCellDef>
                Rating
            </th>

            <td mat-cell *matCellDef="let row">

                <app-star-rating [rating]="row.rating">
                </app-star-rating>
                {{row.rating}}
            </td>

        </ng-container>

        <!-- Date -->

        <ng-container matColumnDef="submitted_on">

            <th mat-header-cell *matHeaderCellDef>
                Date
            </th>

            <td mat-cell *matCellDef="let row">
                {{row.submitted_on}}
            </td>

        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns">
        </tr>

        <tr mat-row *matRowDef="let row; columns: displayedColumns">
        </tr>
    </table>
</ng-container>

<ng-template #empty>

    <app-empty-state
        icon="rate_review"
        title="No Feedback"
        message="Students haven't submitted feedback yet.">
    </app-empty-state>

</ng-template>
</mat-card>
