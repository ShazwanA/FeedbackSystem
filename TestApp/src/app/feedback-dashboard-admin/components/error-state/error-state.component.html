<div class="error-state">

    <mat-icon color="warn">
        error_outline
    </mat-icon>

    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    
    <div class="button-group">
        <button mat-raised-button color="primary" (click)="onRetry()">
            {{ buttonText }}
        </button>

        <button mat-raised-button color="primary" (click)="redirectToHome()">
            Home
        </button>
    </div>

</div>
