<mat-card>

    <mat-card-title>

        ⚡ Quick Actions

    </mat-card-title>

    <div class="action-grid">

        <div
            class="action-card"
            *ngFor="let action of actions"
            (click)="navigate(action.route)">

            <div
                class="icon-circle"
                [style.background]="action.color">

                <mat-icon>

                    {{action.icon}}

                </mat-icon>

            </div>

            <span>

                {{action.title}}

            </span>

        </div>

    </div>

</mat-card>
