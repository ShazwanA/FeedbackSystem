<div>
  <mat-toolbar color="accent">
    <!-- <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
  <mat-icon>menu</mat-icon>
</button> -->
    <span>User Login</span>
    <span class="example-spacer"></span>
    <!-- <button mat-icon-button class="example-icon favorite-icon" aria-label="Example icon-button with heart icon"> -->
      <mat-icon>person</mat-icon>

    <!-- </button> -->

  </mat-toolbar>
</div>
<br>
<div clas="container">

  <!-- <button (click)="testLogin()">Class Based Login</button> -->
  <div class="error-alert" *ngIf="responseMsg">
    <p>{{responseMsg}}</p>
  </div>

  <form class="example-form" [formGroup]="loginform">
    <mat-form-field appearance="outline">
      <mat-label>User Type</mat-label>
      <mat-select formControlName="user_type" name="usertype-listbox">
        <mat-option *ngFor="let user of sharedServices.userType" [value]="user.value">
          {{user.viewValue}}
        </mat-option>
      </mat-select>
    </mat-form-field>
    <span *ngIf="username && username.invalid && username.touched" style="color:red;">Username is required</span>
    <mat-form-field class="example-full-width" appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput placeholder="abc@gmail.com" formControlName="username" type="email" name="username">
    </mat-form-field>
    
    <br>
    <span *ngIf="password && password.invalid && password.touched" style="color:red;">Password is required</span>
    <mat-form-field class="example-full-width" appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" name="password" [type]="showHidePassword ? 'password' : 'text'" >
      <mat-icon matSuffix (click)="showHidePassword = !showHidePassword">{{showHidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
    </mat-form-field>

    <div class="example-button-row">
      <button type="submit" mat-raised-button class="warn" (click)="login()" name="btn-submit-login">
        Login</button>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button mat-raised-button mat-dialog-close color="warn">Close</button>
    </div>
  </form>
  <div class="otheroptions">
    <button mat-button [matMenuTriggerFor]="menu" color="primary" name="signupbtn">Signup</button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="openFacultySignup()" mat-dialog-close>Teacher</button>
      <button mat-menu-item (click)="openStudentSignup()" mat-dialog-close>Student</button>
    </mat-menu>
    <button mat-button color="primary">Forgot Password?</button>
  </div>
</div>
