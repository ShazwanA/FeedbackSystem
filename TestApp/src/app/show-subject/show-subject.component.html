<app-menu></app-menu>
<div>
<h1>Heading Here</h1>
</div>

<div class="data-container">
<h1>All Subject Details</h1>
<mat-form-field appearance="standard">
  <mat-label>Global Search (case sensitive)</mat-label>
  <input matInput (keyup)="applyFilter()" placeholder="Ex. MedPlus" #input [(ngModel)]="filterData">
</mat-form-field>

<div class="table-container mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- Subject name column -->
    <ng-container matColumnDef="subject_name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Subject Name </th>
      <td mat-cell *matCellDef="let row"> {{row.subject_name}} </td>
    </ng-container>

    <!-- Subject code Column -->
    <ng-container matColumnDef="subject_code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Subject Code </th>
      <td mat-cell *matCellDef="let row"> {{row.subject_code}} </td>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Category </th>
      <td mat-cell *matCellDef="let row">
        <a href="javascript:void(0)" (click)="getCategoryDetails(row)"> {{row.category}} </a></td>
    </ng-container>
    
    <!-- Category Column -->
    <ng-container matColumnDef="subject_status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
      <td mat-cell *matCellDef="let row"> {{status.status[0][row.is_active?'active':'inactive']}} </td>
    </ng-container>

    <!-- Action Column -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Actions </th>
      <td mat-cell *matCellDef="let row">
        <button mat-raised-button  color="primary" (click)="editSubjectDetails(row)" *ngIf="userRole == 'admin'">
        <mat-icon>edit</mat-icon>
        Edit
      </button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button mat-raised-button  color="warn"
        (click)="deleteSubjectDetails(row.subject_code, row.subject_name)"
        *ngIf="userRole == 'admin'">
        <mat-icon>delete_fill</mat-icon>
        Delete
      </button>
      </td>
    </ng-container>
    

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>
</div>

  <mat-paginator [pageSizeOptions]="[10, 20, 50, 100]" aria-label="Select page of users"></mat-paginator>
</div>
