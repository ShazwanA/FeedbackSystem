<div class="container">
  <div class="header">
    <mat-toolbar color="accent">
      <span>{{submitBtn}} Category</span>
      <span class="example-spacer"></span>
    </mat-toolbar>
  </div>

  <br>
    <div mat-dialog-content class="content-box">
      <form class="example-form" [formGroup]="addCategoryModel" method="POST">
        
        <mat-form-field class="example-full-width" appearance="outline">
            <mat-label>Category Code</mat-label>
            <input matInput placeholder="CAT000" formControlName="category_code" name="categorycode">
          </mat-form-field>

        <mat-form-field class="example-full-width" appearance="outline">
            <mat-label>Category Name</mat-label>
            <input matInput placeholder="Web Development" formControlName="category_name" name="categoryname">
          </mat-form-field>

          <mat-checkbox formControlName="is_active" *ngIf="isStaff">Activate Category</mat-checkbox>
          <br><br><br>
        </form>
      </div>
      <div class="footer-container">
        <div mat-dialog-actions align="end" class="footer-content">
          <button mat-raised-button [disabled]="!addCategoryModel.valid" (click)="proceed()">
            {{submitBtn}}
          </button>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          <button mat-raised-button color="warn" mat-dialog-close>Close</button>
        </div>
      </div>
    </div>
